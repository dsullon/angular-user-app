<h3> {{title}} </h3>
@if(admin) {
    <button class="btn btn-primary btn-sm my-3" [routerLink]="['/users/create']">
        Crear usuario
    </button>
}


@if (users.length == 0) {
    <div class="alert alert-warning">No hay registros en el sistema</div>
} @else {
    <table class="table table-hover table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>LastName</th>
                <th>Email</th>
                <th>UserName</th>
                @if(admin){
                    <th></th>
                    <th></th>
                }
            </tr>
        </thead>
        <tbody>
            @for (user of users; track user.id) {
                <tr>
                    <td> {{user.name}} </td>
                    <td> {{user.lastName}} </td>
                    <td> {{user.email}} </td>
                    <td> {{user.username}} </td>
                    @if(admin){
                        <td>
                            <button class="btn btn-danger btn-sm"
                                (click)="onRemove(user.id)">
                                Remove
                            </button>
                        </td>
                        <td>
                            <button class="btn btn-info btn-sm"
                                [routerLink]="['/users/edit', user.id]">
                                Update
                            </button>
                        </td>
                    }
                </tr>
            }
        </tbody>
    </table>
    <p><strong>Records count: </strong>{{users.length}}</p>
    <paginator [paginator]="paginator" [url]="'/users/page'" />
}
