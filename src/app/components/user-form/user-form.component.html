
<div class="card">
    <div class="card-content">
        <div class="card-header">
            <h5 class="card-title">{{user.id > 0 ? 'Update': 'Create'}}</h5>
        </div>
        <div class="card-body">
            <form (ngSubmit)="onSubmit(userForm)" #userForm = "ngForm">
                <div class="mb-3">
                    <input class="form-control"
                        placeholder="Name"
                        name="name"
                        [(ngModel)] = "user.name"
                        #name="ngModel">
                        @if(errors?.name){
                            <div class="text-danger">
                                {{errors.name}}
                            </div>
                        }
                </div>
                
                <div class="mb-3">
                    <input class="form-control"
                        placeholder="LastName"
                        name="lastName"
                        [(ngModel)] = "user.lastName"                        
                        #lastName = "ngModel">
                        @if(errors?.lastName){
                            <div class="text-danger">
                                {{errors.lastName}}
                            </div>
                        }
                </div>
                
                <div class="mb-3">
                    <input class="form-control"
                        type="email"
                        placeholder="Email"
                        name="email"
                        [(ngModel)] = "user.email"
                        #email = "ngModel">
                        @if(errors?.email){
                            <div class="text-danger">
                                {{errors.email}}
                            </div>
                        }
                </div>
                
                <div class="mb-3">
                    <input class="form-control"
                        placeholder="UserName"
                        name="userName"
                        [(ngModel)] = "user.userName"
                        minlength="6"
                        #userName = "ngModel">
                        @if(errors?.userName){
                            <div class="text-danger">
                                {{errors.userName}}
                            </div>
                        }
                </div>
                
                <div class="mb-3">
                    <input class="form-control"
                        type="password"
                        placeholder="Password"
                        name="password"
                        [(ngModel)] = "user.password"                        
                        minlength="6"
                        #password = "ngModel">
                        @if(errors?.password){
                            <div class="text-danger">
                                {{errors.password}}
                            </div>
                        }
                </div>

                <div>
                    <button 
                        type="submit" 
                        class="btn btn-primary btn-sm m-2">
                        {{(user.id > 0) ? 'Update' : 'Create'}}
                    </button>

                    <button class="btn btn-secondary btn-sm my-2"
                        (click)="onClear(userForm)">
                        Clear
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
